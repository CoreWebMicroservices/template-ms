server:
  port: ${TEMPLATE-SERVICE-PORT:3004}
  servlet:
    context-path: /${SERVICE_PREFIX:}

spring:
  application:
    name: TEMPLATE-SERVICE
  main:
    banner-mode: off
  jackson:
    default-property-inclusion: non_null
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}
  config:
    import: classpath:db-config.yaml, security-config.yaml

template-service:
  default-language: en
